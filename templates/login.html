<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 20px;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid #333;
      background: #111;
      color: #f0f0f0;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-align: center;
      outline: none;
      transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: #7c6af7; }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #7c6af7;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #6a59e0; }

    .error {
      font-size: 0.85rem;
      color: #f87171;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔒 영상 다운로더</h1>
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="비밀번호" autofocus />
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <button type="submit">입장</button>
    </form>
  </div>
</body>
</html>
